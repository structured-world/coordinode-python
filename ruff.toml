line-length = 120
target-version = "py311"

exclude = [
    # Generated proto stubs — do not lint
    "coordinode/coordinode/_proto/",
    # Generated version files — do not lint
    "_version.py",
]

[lint]
select = ["E", "F", "I", "W", "UP"]
ignore = [
    "E501",  # line length handled by formatter
]
